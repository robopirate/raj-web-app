<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj - RoboPirate Command Center</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/raj.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">🤖</div>
                <div class="brand-text">
                    <h1>RAJ</h1>
                    <span>by RoboPirate</span>
                </div>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item active">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/chat" class="nav-item">
                    <span class="icon">💬</span>
                    <span>Chat</span>
                </a>
                <a href="#" class="nav-item" onclick="showImportModal()">
                    <span class="icon">📥</span>
                    <span>Import</span>
                </a>
                <a href="#" class="nav-item" onclick="showTemplatesModal()">
                    <span class="icon">📄</span>
                    <span>Templates</span>
                </a>
                <a href="#" class="nav-item" onclick="showBatchesModal()">
                    <span class="icon">📦</span>
                    <span>Batches</span>
                </a>
                <a href="#" class="nav-item" onclick="showRepliesModal()">
                    <span class="icon">📧</span>
                    <span>Replies</span>
                </a>
                <a href="#" class="nav-item" onclick="showBlacklistModal()">
                    <span class="icon">🚫</span>
                    <span>Blacklist</span>
                </a>
                <a href="#" class="nav-item" onclick="showSettingsModal()">
                    <span class="icon">⚙️</span>
                    <span>Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="top-left">
                    <h2>🚀 Active Batches</h2>
                </div>
                <div class="top-right">
                    <button class="btn btn-secondary" onclick="scanBounces()">
                        <span>🔍</span> Scan Bounces
                    </button>
                    <button class="btn btn-primary" onclick="toggleEngine()">
                        <span id="engine-icon">▶</span> <span id="engine-text">Start Engine</span>
                    </button>
                </div>
            </header>

            <!-- Dashboard Stats Table -->
            <section class="stats-section">
                <div class="stats-table">
                    <div class="stats-header">
                        <span>Day</span>
                        <span>Total</span>
                        <span>Sent</span>
                        <span>Bounced</span>
                        <span>Replied</span>
                        <span>Status</span>
                    </div>
                    <div id="stats-body">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </section>

            <!-- Pipeline Cards -->
            <section class="pipeline-section" id="pipeline-container">
                <!-- Filled by JS -->
            </section>

            <!-- Activity Log -->
            <section class="activity-section">
                <h3>📜 Activity Log</h3>
                <div class="activity-log" id="activity-log">
                    <!-- Filled by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Import Modal -->
    <div class="modal" id="import-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📥 Import Leads</h3>
                <button class="close-btn" onclick="closeModal('import-modal')">×</button>
            </div>
            <div class="modal-body">
                <form id="import-form" onsubmit="handleImport(event)">
                    <div class="form-group">
                        <label>File (Excel/CSV)</label>
                        <input type="file" name="file" accept=".xlsx,.xls,.csv,.txt" required>
                    </div>
                    <div class="form-group">
                        <label>Sequence</label>
                        <select name="sequence">
                            <option value="school">SCHOOL (Private Schools)</option>
                            <option value="csr">CSR (Corporates)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Batch Size</label>
                        <select name="batch_size">
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value="150">150</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Import</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Templates Modal -->
    <div class="modal" id="templates-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📄 Templates</h3>
                <button class="close-btn" onclick="closeModal('templates-modal')">×</button>
            </div>
            <div class="modal-body" id="templates-list">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/raj.js') }}"></script>
</body>
</html>
